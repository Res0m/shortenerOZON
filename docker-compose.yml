version: '3.8'

services:
  app:
    build: .
    container_name: shortener-app
    ports:
      - "8081:8081" 
    environment:
      - CONFIG_PATH=/root/configs/local.yaml
      - STORAGE_TYPE=${STORAGE_TYPE:-postgres}
      - DB_DSN=${DB_DSN:-postgresql://postgres:1402@db:5432/OzonShortener?sslmode=disable}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shortener-net

  db:
    image: postgres:16-alpine
    container_name: shortener-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-1402}
      POSTGRES_DB: ${DB_NAME:-OzonShortener}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shortener-net

volumes:
  pgdata:

networks:
  shortener-net:
    driver: bridge